version: "2"

linters:
  enable:
    - bodyclose
    - errorlint
    - misspell
    - revive
    - unconvert
    - unparam
  settings:
    errcheck:
      # Cleanup calls whose errors are intentionally ignored.
      exclude-functions:
        - (*database/sql.Rows).Close
        - (*database/sql.DB).Close
        - (*cloud.google.com/go/pubsub/v2.Client).Close
