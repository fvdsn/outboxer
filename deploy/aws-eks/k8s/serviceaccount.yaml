# The pods run as this Kubernetes service account. AWS permissions come from
# EKS Pod Identity: an association in ../infra maps ns/outboxer/sa/outboxer to
# an IAM role, and the Pod Identity agent (built into EKS Auto Mode) serves
# that role's credentials to the pods — no OIDC annotations, no key files.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: outboxer
  namespace: outboxer
  labels:
    app: outboxer
