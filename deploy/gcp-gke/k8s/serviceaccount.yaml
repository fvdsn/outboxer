# The pods run as this Kubernetes service account. GCP permissions come from
# Workload Identity Federation: IAM roles are granted directly to the
# principal ...workloadIdentityPools/PROJECT.svc.id.goog/subject/ns/outboxer/sa/outboxer
# (see ../infra), so no Google service account and no key files are involved.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: outboxer
  namespace: outboxer
  labels:
    app: outboxer
