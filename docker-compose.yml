services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: outboxer
      POSTGRES_USER: outboxer
      POSTGRES_PASSWORD: outboxer
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U outboxer -d outboxer"]
      interval: 1s
      timeout: 5s
      retries: 30
    tmpfs:
      - /var/lib/postgresql/data

  pubsub:
    image: google/cloud-sdk:emulators
    platform: linux/amd64
    command:
      [
        "gcloud",
        "beta",
        "emulators",
        "pubsub",
        "start",
        "--project=outboxer-test",
        "--host-port=0.0.0.0:8085"
      ]
    ports:
      - "8085:8085"

  sqs:
    image: softwaremill/elasticmq-native:latest
    ports:
      - "9324:9324"
