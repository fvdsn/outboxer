name: CI

on:
  push:
    branches: [master, main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: gofmt
        run: |
          unformatted=$(gofmt -l ./cmd ./internal ./test)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-ed:"
            echo "$unformatted"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: golangci-lint
        run: go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2 run ./...

  vuln:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: outboxer
          POSTGRES_USER: outboxer
          POSTGRES_PASSWORD: outboxer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U outboxer -d outboxer"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Build
        run: go build ./...
      - name: Test (race + integration)
        env:
          OUTBOXER_INTEGRATION_PG_DSN: postgres://outboxer:outboxer@localhost:5432/outboxer?sslmode=disable
        run: go test -race -count=1 -coverprofile=coverage.out ./...

  e2e:
    name: Local emulator E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Start local emulators
        run: docker compose up -d postgres pubsub sqs
      - name: Run E2E tests
        run: go test -tags=e2e ./test/e2e -count=1 -v
      - name: Stop local emulators
        if: always()
        run: docker compose down -v --remove-orphans
